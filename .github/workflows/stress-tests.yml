name: Stress Tests

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master, cbc]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION: UserManagement.sln

jobs:
  stress-tests:
    name: Stress Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Run stress tests with reports
        uses: ./.github/actions/test-with-reports
        with:
          test-project: tests/UserManagement.StressTests/UserManagement.StressTests.csproj
          results-subdir: stress
          artifact-name: stress-test-reports
          check-name: Stress Test Results
          collect-coverage: 'false'
