name: CI

on:
  push:
    branches: [main, master, develop, cbc]
  pull_request:
    branches: [main, master, develop, cbc]

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION: UserManagement.sln

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Run lint with reports
        uses: ./.github/actions/lint-with-reports
        with:
          solution: ${{ env.SOLUTION }}
          results-subdir: ci
          artifact-name: lint-reports
          check-name: Lint Results

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build, lint]
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Run unit tests with reports
        uses: ./.github/actions/test-with-reports
        with:
          test-project: tests/UserManagement.UnitTests/UserManagement.UnitTests.csproj
          results-subdir: unit
          artifact-name: unit-test-reports
          check-name: Unit Test Results
          collect-coverage: 'true'

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build, lint]
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Run integration tests with reports
        uses: ./.github/actions/test-with-reports
        with:
          test-project: tests/UserManagement.IntegrationTests/UserManagement.IntegrationTests.csproj
          results-subdir: integration
          artifact-name: integration-test-reports
          check-name: Integration Test Results
          collect-coverage: 'false'
